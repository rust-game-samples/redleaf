{% extends "admin/base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Settings</h1>
</div>

{% if let Some(msg) = saved %}
<div style="background:#d1fae5;color:#065f46;padding:.75rem 1rem;border-radius:6px;margin-bottom:1.25rem;">
  {{ msg }}
</div>
{% endif %}

<div class="card">
  <form method="post" action="/admin/settings">
    <h2 style="margin-top:0;font-size:1.1rem;color:#374151;">Post URL Format</h2>
    <p style="color:#6b7280;font-size:.9rem;margin-top:0;">
      Controls how public post URLs are generated.
    </p>

    <div style="display:flex;flex-direction:column;gap:.75rem;margin-bottom:1.5rem;">
      <label style="display:flex;align-items:flex-start;gap:.75rem;cursor:pointer;font-weight:normal;">
        <input type="radio" name="post_url_type" value="slug"
          {% if post_url_type == "slug" %}checked{% endif %}
          style="margin-top:.2rem;width:auto;">
        <span>
          <strong>Slug</strong>
          <span style="display:block;color:#6b7280;font-size:.85rem;">
            /posts/my-post-title &nbsp;—&nbsp; human-readable, SEO-friendly (default)
          </span>
        </span>
      </label>
      <label style="display:flex;align-items:flex-start;gap:.75rem;cursor:pointer;font-weight:normal;">
        <input type="radio" name="post_url_type" value="id"
          {% if post_url_type == "id" %}checked{% endif %}
          style="margin-top:.2rem;width:auto;">
        <span>
          <strong>ID</strong>
          <span style="display:block;color:#6b7280;font-size:.85rem;">
            /posts/42 &nbsp;—&nbsp; numeric, always stable
          </span>
        </span>
      </label>
    </div>

    <button type="submit" class="btn btn-primary">Save settings</button>
  </form>
</div>
{% endblock %}
