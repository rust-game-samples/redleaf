{% extends "admin/base.html" %}

{% block title %}{{ heading }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ heading }}</h1>
  <a href="/admin/posts" class="btn btn-secondary">← Back to Posts</a>
</div>
<div class="card">
  {% if let Some(err) = &error %}
  <div class="alert-error">{{ err }}</div>
  {% endif %}
  <form method="post" action="{{ action }}">
    <div class="form-group">
      <label for="title">Title <span style="color:#dc2626">*</span></label>
      <input type="text" id="title" name="title" value="{{ title }}" required autocomplete="off">
    </div>
    <div class="form-group">
      <label for="slug">Slug <span style="color:#dc2626">*</span></label>
      <input type="text" id="slug" name="slug" value="{{ slug }}" required autocomplete="off">
    </div>
    <div class="form-group">
      <label for="excerpt">Excerpt</label>
      <input type="text" id="excerpt" name="excerpt" value="{{ excerpt }}" placeholder="Brief summary (optional)">
    </div>
    <div class="form-group">
      <label for="category_id">Category</label>
      <select id="category_id" name="category_id" style="width:100%;padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:4px;font-family:inherit;font-size:.95rem;background:white;">
        <option value="">— None —</option>
        {% for cat in categories %}
        <option value="{{ cat.id }}"
          {% if let Some(sel_id) = selected_category_id %}
            {% if *sel_id == cat.id %}selected{% endif %}
          {% endif %}
        >{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="tags">Tags</label>
      <input type="text" id="tags" name="tags" value="{{ tag_names }}"
             placeholder="Comma-separated, e.g. rust, web, tutorial">
      <small style="color:#6b7280;display:block;margin-top:.3rem;">Tags are created automatically if they don't exist.</small>
    </div>
    <div class="form-group">
      <label for="content">Content (Markdown) <span style="color:#dc2626">*</span></label>
      <textarea id="content" name="content" class="content-field" required>{{ content }}</textarea>
    </div>
    <div class="form-group">
      <div class="check-group">
        <input type="checkbox" id="published" name="published" {% if published %}checked{% endif %}>
        <label for="published">Publish immediately</label>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Save Post</button>
  </form>
</div>
<script>
  const titleEl = document.getElementById('title');
  const slugEl  = document.getElementById('slug');
  let slugEdited = slugEl.value.length > 0;
  slugEl.addEventListener('input', () => { slugEdited = true; });
  titleEl.addEventListener('input', () => {
    if (!slugEdited) {
      slugEl.value = titleEl.value.toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-');
    }
  });
</script>
{% endblock %}
