{% extends "admin/base.html" %}

{% block title %}{{ heading }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ heading }}</h1>
  <a href="/admin/pages" class="btn btn-secondary">← Back to Pages</a>
</div>
<div class="card">
  {% if let Some(err) = &error %}
  <div class="alert-error">{{ err }}</div>
  {% endif %}
  <form method="post" action="{{ action }}">
    <div class="form-group">
      <label for="title">Title <span style="color:#dc2626">*</span></label>
      <input type="text" id="title" name="title" value="{{ title }}" required autocomplete="off">
    </div>
    <div class="form-group">
      <label for="slug">Slug <span style="color:#dc2626">*</span></label>
      <input type="text" id="slug" name="slug" value="{{ slug }}" required autocomplete="off">
    </div>
    <div class="form-group">
      <label for="parent_id">Parent Page</label>
      <select id="parent_id" name="parent_id" style="width:100%;padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:4px;font-family:inherit;font-size:.95rem;background:white;">
        <option value="">— None (top-level) —</option>
        {% for p in all_pages %}
        <option value="{{ p.id }}"
          {% if let Some(pid) = parent_id %}
            {% if *pid == p.id %}selected{% endif %}
          {% endif %}
        >{{ p.title }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="content">Content (Markdown)</label>
      <textarea id="content" name="content" class="content-field">{{ content }}</textarea>
    </div>
    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" name="status" style="width:200px;padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:4px;font-family:inherit;font-size:.95rem;background:white;">
        <option value="draft" {% if status == "draft" %}selected{% endif %}>Draft</option>
        <option value="published" {% if status == "published" %}selected{% endif %}>Published</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Save Page</button>
  </form>
</div>
<script>
  const titleEl = document.getElementById('title');
  const slugEl  = document.getElementById('slug');
  let slugEdited = slugEl.value.length > 0;
  slugEl.addEventListener('input', () => { slugEdited = true; });
  titleEl.addEventListener('input', () => {
    if (!slugEdited) {
      slugEl.value = titleEl.value.toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-');
    }
  });
</script>
{% endblock %}
