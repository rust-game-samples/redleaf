<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — RedLeaf Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f0f4f0; color: #222;
           min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.1);
            padding: 2.5rem 2rem; width: 100%; max-width: 380px; }
    .logo { text-align: center; margin-bottom: 1.75rem; }
    .logo-icon { font-size: 2.5rem; }
    .logo h1 { margin: .4rem 0 .2rem; color: #2d5f3e; font-size: 1.5rem; }
    .logo p { margin: 0; color: #666; font-size: .85rem; }
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; margin-bottom: .35rem; font-weight: 500; font-size: .9rem; color: #374151; }
    input { width: 100%; padding: .55rem .75rem; border: 1px solid #d1d5db; border-radius: 5px;
            font-family: inherit; font-size: .95rem; }
    input:focus { outline: none; border-color: #2d5f3e; box-shadow: 0 0 0 3px rgba(45,95,62,.12); }
    .btn { width: 100%; padding: .65rem; background: #2d5f3e; color: white; border: none;
           border-radius: 5px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: .5rem; }
    .btn:hover { background: #234a30; }
    .alert { background: #fee2e2; color: #991b1b; padding: .7rem 1rem; border-radius: 5px;
             margin-bottom: 1rem; font-size: .9rem; }
    .footer-link { text-align: center; margin-top: 1.25rem; font-size: .88rem; color: #6b7280; }
    .footer-link a { color: #2d5f3e; text-decoration: none; font-weight: 500; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🌿</div>
      <h1>RedLeaf</h1>
      <p>Create an account</p>
    </div>
    {% if let Some(err) = error %}
    <div class="alert">{{ err }}</div>
    {% endif %}
    <form method="post" action="/admin/register">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus value="{{ prefill_username }}">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required value="{{ prefill_email }}">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8">
      </div>
      <button type="submit" class="btn">Create account</button>
    </form>
    <p class="footer-link">Already have an account? <a href="/admin/login">Sign in</a></p>
  </div>
</body>
</html>
